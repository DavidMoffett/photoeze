<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gallery</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{margin:0;background:#0f2333;color:#fff;font-family:system-ui}
.wrap{max-width:1000px;margin:auto;padding:20px}
h1{font-family:'Syne'}

input,button{width:100%;padding:12px;margin-top:10px;border-radius:8px;border:none}
button{background:#c7a35a;font-weight:bold}

.panel{background:#0a1823;padding:16px;border-radius:12px;margin-bottom:12px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}

img{width:100%;height:200px;object-fit:cover;border-radius:8px;cursor:pointer}

.hidden{display:none}
</style>
</head>

<body>
<div class="wrap">

<h1 id="title">Gallery</h1>

<div id="entry">
<input id="name" placeholder="Your name">
<input id="email" placeholder="Your email">
<button onclick="enter()">Enter</button>
</div>

<div id="gallery" class="hidden">
<div id="photos" class="grid"></div>
</div>

</div>

<script>
const sb = supabase.createClient(
'https://lqqnkxqcdyudfanjmaqu.supabase.co',
'YOUR_ANON_KEY'
);

let galleryId=new URLSearchParams(window.location.search).get('gallery_id');

async function enter(){
const {data}=await sb.from('galleries').select('*').eq('id',galleryId).single();
title.innerText=data.name;

entry.style.display='none';
gallery.style.display='block';

loadPhotos();
}

async function loadPhotos(){
const {data}=await sb.from('photos').select('*').eq('gallery_id',galleryId);

let html='';
for(const p of data){
const {data:url}=await sb.storage.from('photos-original').createSignedUrl(p.storage_path,3600);
html+=`<img src="${url.signedUrl}">`;
}
photos.innerHTML=html;
}
</script>

</body>
</html>
